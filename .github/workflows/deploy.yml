name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger

env:
  DEPLOY_PATH: /home/abcdev/projects/2bot

jobs:
  # First run tests to make sure code is good
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

  # Deploy after tests pass
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    environment: production  # Uses GitHub environment for secrets
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🚀 Starting deployment..."
            cd ${{ env.DEPLOY_PATH }}
            
            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            
            # Run deployment script
            ./scripts/deploy/deploy.sh
            
            echo "✅ Deployment complete!"

      - name: Notify Success
        if: success()
        run: echo "✅ Deployment to production successful!"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs above."
