# ============================================
# 2Bot Workspace Egress Proxy — Squid Configuration
# ============================================
#
# Purpose:
#   Forward proxy for workspace containers. Provides:
#   - Domain-level whitelist (only allowed destinations)
#   - Per-request access logging with source IP (maps to container)
#   - Rate limiting via delay pools
#   - CONNECT tunnel support for HTTPS and WebSocket
#
# All workspace containers are configured to use this proxy
# via HTTP_PROXY / HTTPS_PROXY environment variables.
#
# Log format includes container IP for per-user attribution.
# ============================================

# ===========================================
# Network Configuration
# ===========================================

# Listen on all interfaces, port 3128
http_port 3128

# ===========================================
# Access Control Lists (ACLs)
# ===========================================

# Workspace container subnet
acl workspace_containers src 172.20.0.0/16

# SSL ports (CONNECT method)
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443

# Allowed destination domains (system-wide, always available)
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain .yarnpkg.com
acl allowed_domains dstdomain .github.com
# "github.com" removed - covered by .github.com (matches domain and subdomains)
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain .gitlab.com
# "gitlab.com" removed - covered by .gitlab.com
acl allowed_domains dstdomain .bitbucket.org
# "bitbucket.org" removed - covered by .bitbucket.org
acl allowed_domains dstdomain .telegram.org
# Note: "api.telegram.org" covered by .telegram.org (matches domain and subdomains)
acl allowed_domains dstdomain .discord.com
# "discord.com" removed - covered by .discord.com
acl allowed_domains dstdomain gateway.discord.gg
acl allowed_domains dstdomain discord.gg

# Admin-blocked domains (ALWAYS denied, overrides user allowlists)
# Managed by 2bot API — contains one domain per line
acl admin_blocked dstdomain "/etc/squid/config/admin-blocked-domains.txt"

# CONNECT method (for HTTPS tunneling)
acl CONNECT method CONNECT

# ===========================================
# Access Rules
# ===========================================

# Deny non-safe ports
http_access deny !Safe_ports

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Admin blacklist: always deny, before any allow rules
http_access deny workspace_containers admin_blocked

# Allow workspace containers to system-wide whitelisted domains
http_access allow workspace_containers allowed_domains

# Per-container user domain ACLs (generated by 2bot API)
# Maps each container IP to its owner's domain allowlist
include /etc/squid/config/per-container-acls.conf

# Deny everything else
http_access deny all

# ===========================================
# Logging — Per-request with container IP
# ===========================================

# Custom log format:
# timestamp elapsed_ms source_ip squid_status/http_status bytes method url
logformat 2bot %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru
access_log /var/log/squid/access.log 2bot

# Don't log internal Squid cache operations
cache_log /var/log/squid/cache.log

# ===========================================
# Cache Configuration
# ===========================================

# Minimal cache — we're a forward proxy, not a caching proxy
cache deny all
cache_mem 16 MB
maximum_object_size 4 MB

# ===========================================
# Delay Pools — Rate Limiting
# ===========================================

# Pool 1: Per-source-IP rate limiting
# Class 2 = aggregate + per-host buckets
delay_pools 1
delay_class 1 2

# Aggregate: unlimited (-1/-1)
# Per-host: 200KB/s sustained, 500KB burst
# This prevents a single container from saturating bandwidth
delay_parameters 1 -1/-1 200000/500000

# Apply to workspace containers
delay_access 1 allow workspace_containers
delay_access 1 deny all

# ===========================================
# Security & Performance
# ===========================================

# Don't reveal Squid version
httpd_suppress_version_string on

# Forward client IP in X-Forwarded-For (for audit)
forwarded_for on

# Connection timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 60 seconds

# Limit concurrent connections per source IP
# (prevents connection exhaustion)
# Note: acl maxconn only applies to CONNECT tunnels
acl too_many_conns maxconn 50
http_access deny workspace_containers too_many_conns

# DNS
dns_nameservers 8.8.8.8 8.8.4.4 1.1.1.1

# PID file
pid_filename /var/run/squid/squid.pid

# Coredump directory
coredump_dir /var/spool/squid

# Visible hostname
visible_hostname 2bot-proxy
