# ===========================================
# 2Bot.org - Enterprise Nginx Configuration
# ===========================================
# Phase 6.7.5.4: Multi-subdomain reverse proxy
#
# Subdomains:
#   - 2bot.org         → Redirects to www.2bot.org
#   - www.2bot.org     → Landing/Marketing (:3000)
#   - dash.2bot.org    → Dashboard (:3001)
#   - api.2bot.org     → API Server (:3002)
#   - docs.2bot.org    → Documentation (:3003)
#   - (reserved)       → Future (:3004)
#   - dev.2bot.org     → Dev Frontend (:3005)
#   - dev-api.2bot.org  → Dev API (:3006)
#   - admin.2bot.org   → Admin Panel (:3007)
#   - support.2bot.org → Support Team (:3008)
#
# Prerequisites:
#   - Cloudflare Origin Certificate at /etc/nginx/ssl/2bot.crt
#   - Cloudflare Origin Key at /etc/nginx/ssl/2bot.key
#   - DNS records pointing all subdomains to this server
#
# Installation:
#   sudo cp nginx/2bot.enterprise.conf /etc/nginx/sites-available/2bot
#   sudo ln -sf /etc/nginx/sites-available/2bot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ===========================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=2bot_api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=2bot_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=2bot_general:10m rate=200r/s;
limit_req_zone $binary_remote_addr zone=2bot_admin:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=2bot_webhook:10m rate=200r/s;

# Gateway → container routing map
# Maps gateway UUIDs to container IP:port for direct webhook delivery.
# File is managed by gateway-route.service.ts and hot-reloaded via nginx -s reload.
map $gateway_id $webhook_backend {
    include /etc/nginx/conf.d/gateway-routes.map;
    default "";
}

# Upstream definitions
upstream 2bot_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream 2bot_dashboard {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream 2bot_api {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream 2bot_docs {
    server 127.0.0.1:3003;
    keepalive 32;
}

upstream 2bot_dev {
    server 127.0.0.1:3005;
    keepalive 32;
}

upstream 2bot_dev_api {
    server 127.0.0.1:3006;
    keepalive 32;
}

upstream 2bot_admin {
    # Separate Next.js dev instance for admin (isolated from dev)
    server 127.0.0.1:3007;
    keepalive 32;
}

upstream 2bot_support {
    server 127.0.0.1:3008;
    keepalive 32;
}

# ===========================================
# HTTP to HTTPS redirect (all subdomains)
# ===========================================
server {
    listen 80;
    listen [::]:80;
    server_name 2bot.org www.2bot.org dash.2bot.org api.2bot.org admin.2bot.org support.2bot.org docs.2bot.org dev.2bot.org dev-api.2bot.org webhook.2bot.org;

    # Health check (for load balancers)
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================================
# Redirect: 2bot.org → www.2bot.org
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Always redirect 2bot.org to www.2bot.org
    return 301 https://www.2bot.org$request_uri;
}

# ===========================================
# Main Site: www.2bot.org (:3000)
# Landing pages, marketing, public content
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_2BOT:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/2bot.org.access.log;
    error_log /var/log/nginx/2bot.org.error.log warn;

    location / {
        proxy_pass http://2bot_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ===========================================
# Dashboard: dash.2bot.org
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dash.2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/dash.2bot.org.access.log;
    error_log /var/log/nginx/dash.2bot.org.error.log warn;

    limit_req zone=2bot_general burst=50 nodelay;

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://2bot_dashboard;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js HMR WebSocket (development only)
    location /_next/webpack-hmr {
        proxy_pass http://2bot_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://2bot_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ===========================================
# API: api.2bot.org
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/api.2bot.org.access.log;
    error_log /var/log/nginx/api.2bot.org.error.log warn;

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://2bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Stripe webhook (no rate limit, raw body)
    location = /webhooks/stripe {
        proxy_pass http://2bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Auth endpoints - stricter rate limiting
    location ~ ^/(auth|login|register|forgot-password) {
        limit_req zone=2bot_auth burst=10 nodelay;
        
        proxy_pass http://2bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoints (workspace terminals, etc.)
    location /ws/ {
        proxy_pass http://2bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All other API routes
    location / {
        limit_req zone=2bot_api burst=50 nodelay;
        
        proxy_pass http://2bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        client_max_body_size 50M;
    }
}

# ===========================================
# Admin: admin.2bot.org (DEV ONLY)
# 
# Admin panel is for internal use only and runs in dev mode.
# - Frontend: admin.2bot.org → :3007
# - API calls: dev-api.2bot.org → :3006 (all routes incl. /admin)
# 
# Start with: make dev
# Stop with: make stop-dev
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Extra security for admin panel
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # CSP: Allow API calls, Cloudflare insights, Monaco editor CDN, and necessary resources
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://api.2bot.org https://dev-api.2bot.org wss://dev-api.2bot.org https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' data: https://cdn.jsdelivr.net; worker-src 'self' blob:;" always;

    access_log /var/log/nginx/admin.2bot.org.access.log;
    error_log /var/log/nginx/admin.2bot.org.error.log warn;

    # IP allowlist for admin (RECOMMENDED: Uncomment and configure)
    # Replace with your actual IP addresses or CIDR ranges
    # Example for single IPs:
    # allow 1.2.3.4;        # Your office IP
    # allow 5.6.7.8;        # Your home IP
    # Example for network ranges:
    # allow 10.0.0.0/8;     # Private network
    # allow 192.168.1.0/24; # Your subnet
    # deny all;             # Block all other IPs
    # 
    # To get your current IP: curl ifconfig.me

    location / {
        # Rate limiting for admin panel
        limit_req zone=2bot_admin burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://2bot_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

