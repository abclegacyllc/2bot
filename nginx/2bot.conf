# ===========================================
# Dev API: dev-api.2bot.org (Development API)
# 
# Serves ALL routes (user + admin) in development mode.
# Used by both dev.2bot.org (user routes) and admin.2bot.org (admin routes).
# Admin routes are under /admin prefix (e.g., /admin/users, /admin/stats).
# 
# Start with: make dev
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev-api.2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;

    access_log /var/log/nginx/dev-api.2bot.org.access.log;
    error_log /var/log/nginx/dev-api.2bot.org.error.log warn;

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://2bot_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket endpoints (workspace terminals, etc.)
    location /ws/ {
        proxy_pass http://2bot_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All API routes
    location / {
        limit_req zone=2bot_api burst=50 nodelay;

        proxy_pass http://2bot_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        client_max_body_size 50M;
    }
}

# ===========================================
# Webhook: webhook.2bot.org
# ===========================================
# Routes inbound webhooks (Telegram, etc.) to workspace containers
# when a direct route exists. Falls back to the main API server
# so existing webhook handling continues to work during migration.
# ===========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webhook.2bot.org;

    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/webhook.2bot.org.access.log;
    error_log /var/log/nginx/webhook.2bot.org.error.log warn;

    # Health check
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Telegram webhook: /telegram/<gatewayId>
    # If the gateway has a direct container route, proxy there.
    # Otherwise fall back to the main API server's webhook handler.
    location ~ ^/telegram/(?<gateway_id>[a-z0-9_-]+)$ {
        limit_req zone=2bot_webhook burst=100 nodelay;

        # Default: fall back to main API server's existing webhook handler
        set $upstream_host "127.0.0.1:3002";
        set $upstream_path "/webhooks/telegram/$gateway_id";

        # Override when a container route exists in the map
        if ($webhook_backend != "") {
            set $upstream_host $webhook_backend;
            set $upstream_path "/webhook/telegram/$gateway_id";
        }

        proxy_pass http://$upstream_host$upstream_path;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Reject everything else
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }
}
